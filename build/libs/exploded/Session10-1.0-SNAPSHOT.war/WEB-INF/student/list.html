<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, 'Danh mục thiết bị / phòng Lab')}">
<section>
  <div class="card card-soft">
    <div class="card-body">
      <h4 class="mb-3">Danh mục thiết bị / phòng Lab</h4>

      <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
          <th>Hình ảnh</th>
          <th>Tên</th>
          <th>Số lượng còn lại</th>
          <th width="160">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${equipments}">
          <td>
            <img th:src="${e.image}" alt="Ảnh thiết bị"
                 style="width:100px;height:70px;object-fit:cover;" class="rounded border">
          </td>

          <td>
            <strong th:text="${e.name}">Thiết bị</strong>
          </td>
          <td>
            <span class="badge bg-primary" th:text="${e.quantity}">0</span>
          </td>
          <td>
            <a class="btn btn-success btn-sm"
               th:href="@{/student/borrow/{id}(id=${e.id})}">
              Đăng ký mượn
            </a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(equipments)}">
          <td colspan="4" class="text-center text-muted">Chưa có thiết bị nào.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
</html>
