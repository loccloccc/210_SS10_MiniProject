<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, pageTitle)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${pageTitle}">Lab Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f7fb; }
    .card-soft { border: 0; box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,.08); }
    .required::after { content: " *"; color: #dc3545; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/student/equipments}">Lab Portal</a>
    <div class="navbar-nav">
      <a class="nav-link" th:href="@{/student/equipments}">Sinh viên</a>
      <a class="nav-link" th:href="@{/admin/equipments}">Quản lý thiết bị</a>
      <a class="nav-link" th:href="@{/admin/requests}">Danh sách yêu cầu</a>
    </div>
  </div>
</nav>

<main class="container pb-5">
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
